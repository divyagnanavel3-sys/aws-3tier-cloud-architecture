<!DOCTYPE html>
<html>
<head>
  <title>My Cloud Project</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      text-align: center;
      color: white;
    }

    .container {
      margin-top: 150px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: white;
      color: #4facfe;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background-color: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Hello</h1>
    <p>This is my Cloud Practice Project</p>
    <button class="btn">Welcome</button>
  </div>
</body>
</html>
